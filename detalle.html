<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalle del Servicio | JUNYHEL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#0b1d3a;
color:white;
}

/* CONTENEDOR */
.box{
background:white;
color:black;
border-radius:20px;
padding:30px;
box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* IMAGEN */
.img-servicio{
width:100%;
height:350px;
object-fit:cover;
border-radius:20px;
}

/* SECCIONES */
.titulo{
font-weight:bold;
margin-bottom:15px;
}

ul{
padding-left:20px;
}

.btn-main{
background:#ff6600;
border:none;
}

.btn-main:hover{
background:#ff8533;
}
</style>

</head>

<body>

<div class="container mt-5">

<div class="row g-4">

<!-- IMAGEN -->
<div class="col-md-6">
<img id="img" class="img-servicio">
</div>

<!-- DETALLE -->
<div class="col-md-6">

<div class="box">

<h2 id="titulo"></h2>

<p id="descripcion"></p>

<hr>

<h5 class="titulo">🛠️ ¿Qué incluye?</h5>
<ul id="incluye"></ul>

<h5 class="titulo">💡 ¿Para quién es?</h5>
<p id="para"></p>

<h5 class="titulo">⏱️ Tiempo estimado</h5>
<p id="tiempo"></p>

<hr>

<a href="checkout.html" class="btn btn-success w-100 mb-2">
Solicitar Servicio
</a>

<a href="servicios.html" class="btn btn-outline-dark w-100">
⬅ Volver a servicios
</a>

</div>

</div>

</div>

</div>

<!-- SCRIPT -->
<script src="js/app.js"></script>

<script>

// OBTENER ID DESDE URL
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let servicioSeleccionado = null;

// BUSCAR EN TODAS LAS CATEGORÍAS
data.forEach(cat => {
cat.servicios.forEach(s => {
if(s.id === id){
servicioSeleccionado = s;
}
});
});

// MOSTRAR DATOS
document.getElementById("titulo").innerText = servicioSeleccionado.titulo;
document.getElementById("descripcion").innerText = servicioSeleccionado.descripcion;
document.getElementById("para").innerText = servicioSeleccionado.para;
document.getElementById("tiempo").innerText = servicioSeleccionado.tiempo;
document.getElementById("img").src = servicioSeleccionado.img;

// LISTA
let lista = "";
servicioSeleccionado.incluye.forEach(i => {
lista += "<li>✔ " + i + "</li>";
});
document.getElementById("incluye").innerHTML = lista;

// WHATSAPP DINÁMICO PRO 🔥
function enviarWhatsApp(){

let mensaje = "Hola, quiero solicitar el servicio:%0A";
mensaje += servicioSeleccionado.titulo + "%0A%0A";

mensaje += "Detalles:%0A";
mensaje += "- " + servicioSeleccionado.descripcion + "%0A";
mensaje += "- Para: " + servicioSeleccionado.para + "%0A";
mensaje += "- Tiempo: " + servicioSeleccionado.tiempo + "%0A";

window.open("https://wa.me/59179559806?text=" + mensaje);

}

</script>

</body>
</html>
