<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Servicios | JUNYHEL</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background: radial-gradient(circle at top, #1a3a6b, #0b1d3a);
color: rgb(71, 194, 247);
-webkit-text-stroke: 0.5px rgb(61, 89, 244); /* borde blanco */
font-weight: bold;
}

.card-pro{
background:white;
color:black;
border-radius:20px;
overflow:hidden;
transition:0.3s;
}

.card-pro:hover{
transform:scale(1.05);
box-shadow:0 15px 30px rgba(0,0,0,0.5);
}

.card-pro img{
height:180px;
object-fit:cover;
}

.section-title{
margin-top:60px;
margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container mt-5">
<a href="index.html" class="btn btn-outline-light mb-3">
⬅ Volver al menú
</a>
<h1 class="text-center">Servicios Profesionales</h1>

<div id="contenedor"></div>

</div>

<script src="js/app.js"></script>
<!-- MODAL -->
<div class="modal fade" id="modalServicio" tabindex="-1">
<div class="modal-dialog modal-lg">
<div class="modal-content">

<div class="modal-header">
<h5 class="modal-title" id="modalTitulo"></h5>
<button class="btn-close" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">

<img id="modalImg" class="img-fluid mb-3">

<p id="modalDesc"></p>

<h6>Incluye:</h6>
<ul id="modalIncluye"></ul>

<p><strong>Tiempo:</strong> <span id="modalTiempo"></span></p>

</div>

<div class="modal-footer">
<button class="btn btn-success" onclick="contactarModal()">
Solicitar
</button>
</div>

</div>
</div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
