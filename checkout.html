<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Solicitar servicio</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-white">

<div class="container mt-5">

<button onclick="history.back()" class="btn btn-outline-light mb-3">
⬅ Volver atrás
</button>

<h2 class="text-center mb-4">Solicitar servicio</h2>

<form class="row g-3 needs-validation" novalidate>

<div class="col-md-6">
<label class="form-label">Nombre</label>
<input type="text" class="form-control" required>
<div class="valid-feedback">Correcto</div>
<div class="invalid-feedback">Ingrese su nombre</div>
</div>

<div class="col-md-6">
<label class="form-label">Correo</label>
<input type="email" class="form-control" required>
<div class="valid-feedback">Correcto</div>
<div class="invalid-feedback">Correo inválido</div>
</div>

<div class="col-12">
<label class="form-label">Dirección</label>
<input type="text" class="form-control" required>
<div class="valid-feedback">Correcto</div>
<div class="invalid-feedback">Ingrese dirección</div>
</div>

<!-- MÉTODO DE PAGO -->
<div class="col-12">
<label class="form-label">Método de pago</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="pago" required>
<label class="form-check-label">Efectivo</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="pago">
<label class="form-check-label">Transferencia</label>
</div>

</div>

<!-- TÉRMINOS -->
<div class="col-12">
<div class="form-check">
<input class="form-check-input" type="checkbox" required>
<label class="form-check-label">Acepto términos y condiciones</label>
<div class="invalid-feedback">Debe aceptar</div>
</div>
</div>

<div class="col-12">
<button class="btn btn-success w-100" type="submit">
Finalizar y enviar
</button>
</div>

</form>

</div>

<script>
(() => {
'use strict'

const form = document.querySelector('.needs-validation');

form.addEventListener('submit', function (event) {

event.preventDefault();

if (!form.checkValidity()) {
event.stopPropagation();
form.classList.add('was-validated');
return;
}

// OBTENER DATOS
let inputs = form.querySelectorAll("input");

let nombre = inputs[0].value;
let correo = inputs[1].value;
let direccion = inputs[2].value;

// MÉTODO DE PAGO
let pago = "";
document.querySelectorAll("input[name='pago']").forEach(r => {
if(r.checked){
pago = r.nextElementSibling.innerText;
}
});

// MENSAJE
let mensaje = "Hola, quiero solicitar un servicio:%0A%0A";
mensaje += "👤 Nombre: " + nombre + "%0A";
mensaje += "📧 Correo: " + correo + "%0A";
mensaje += "📍 Dirección: " + direccion + "%0A";
mensaje += "💳 Pago: " + pago + "%0A";

// REDIRECCIÓN A WHATSAPP
window.open("https://wa.me/59179559806?text=" + mensaje, "_blank");

}, false);

})();
</script>

</body>
</html>
